# Serves the SPA and reverse-proxies /api to the gateway over the internal
# Trust Node network (the gateway is never exposed publicly — PDF 5.2).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cap upload size at the edge (gateway also enforces MAX_REQUEST_BYTES).
    client_max_body_size 2m;

    # Baseline security headers for the static app.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    # Content-Security-Policy: defense-in-depth against XSS (which would
    # otherwise be able to read the token in localStorage). 'unsafe-inline'
    # for styles is required by the animation/3D libraries; scripts are 'self'.
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data: blob:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; worker-src 'self' blob:" always;
    server_tokens off;

    # SPA history fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Internal reverse proxy to the gateway service.
    location /api/ {
        proxy_pass http://gateway:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /api;
        proxy_read_timeout 120s;
    }
}
