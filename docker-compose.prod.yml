# Talamanda Trust Node — PRODUCTION stack.
#
#   docker compose -f docker-compose.prod.yml up --build -d
#
# Differences vs the dev compose:
#   * Redis for shared rate-limiting / login lockout across gateway workers
#   * Schema managed by Alembic (AUTO_MIGRATE=false); migrations run on boot
#   * TLS terminated by an nginx proxy (mount your certs into ./deploy/certs)
#   * Strict config: the gateway refuses to boot without JWT_SECRET,
#     ENCRYPTION_KEY, NOTARY_PRIVATE_KEY_PEM and an explicit CORS allow-list.
#
# Required env (put in a .env file next to this compose — see .env.example):
#   POSTGRES_PASSWORD, JWT_SECRET, ENCRYPTION_KEY, NOTARY_PRIVATE_KEY_PEM,
#   CORS_ORIGINS, PUBLIC_HOST

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trust
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: talamanda
    volumes:
      - trust_pgdata:/var/lib/postgresql/data
    networks: [internal]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trust -d talamanda"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    networks: [internal]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build: ./backend
    environment:
      ENVIRONMENT: production
      AUTO_MIGRATE: "false"
      DATABASE_URL: postgresql://trust:${POSTGRES_PASSWORD}@db:5432/talamanda
      DB_SSL_REQUIRED: "false"             # internal network
      REDIS_URL: redis://redis:6379/0
      API_KEYS: ${API_KEYS:-}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?set ENCRYPTION_KEY}
      NOTARY_PRIVATE_KEY_PEM: ${NOTARY_PRIVATE_KEY_PEM:?set NOTARY_PRIVATE_KEY_PEM}
      CORS_ORIGINS: ${CORS_ORIGINS:?set CORS_ORIGINS}
      ENCRYPT_AUDIT_CONTENT: ${ENCRYPT_AUDIT_CONTENT:-true}
      AUDIT_RETENTION_DAYS: ${AUDIT_RETENTION_DAYS:-365}
      RISK_HOLD_THRESHOLD: ${RISK_HOLD_THRESHOLD:-0.6}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-120}
      OTEL_EXPORTER: ${OTEL_EXPORTER:-none}
      OTEL_EXPORTER_ENDPOINT: ${OTEL_EXPORTER_ENDPOINT:-}
      HSTS: "true"
      # Phase 1: durable bus uses REDIS_URL above; opt into pgvector + scanning.
      VECTOR_BACKEND: ${VECTOR_BACKEND:-memory}
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-auto}
      SECURITY_LLM_SCAN: ${SECURITY_LLM_SCAN:-false}
      SECURITY_SCAN_OUTPUTS: ${SECURITY_SCAN_OUTPUTS:-true}
      NOTARY_VERIFY_KEYS: ${NOTARY_VERIFY_KEYS:-}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
      ROOT_PATH: /api
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}
    networks: [internal, edge]
    restart: unless-stopped
    expose: ["8000"]

  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    depends_on: [gateway]
    networks: [edge]
    restart: unless-stopped
    expose: ["80"]

  proxy:
    image: nginx:1.27-alpine
    depends_on: [web]
    networks: [edge]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx-tls.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro

volumes:
  trust_pgdata:

networks:
  internal:
    internal: true
  edge:
    driver: bridge
