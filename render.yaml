# render.yaml — Aegis backend deployment blueprint (Render, free-tier)
#
# Deploys the FastAPI gateway as a single Docker web service on Render's FREE
# plan. The rate limiter and event bus fall back to an in-process implementation
# when REDIS_URL is unset, so no paid Redis instance is required for a single
# instance. The frontend deploys separately to Vercel (frontend/vercel.json).
#
# NOTE: the free plan runs ONE instance and sleeps after ~15 min idle (first
# request then takes ~30-60s to wake). To scale horizontally later, add a Redis
# instance + REDIS_URL and bump the plan/worker count.
#
# Usage: push this repo, then in Render → "New" → "Blueprint" and point it here.
# Fill the `sync: false` secrets in the Render dashboard after the first deploy.
services:
  - type: web
    name: aegis-gateway
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free               # bump to standard+ (and add Redis) for production traffic
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      # Free plan = single instance with limited memory → run one worker so the
      # in-process rate limiter / event bus stay consistent.
      - key: UVICORN_WORKERS
        value: "1"
      # TLS is terminated by Render → safe to enable HSTS.
      - key: HSTS
        value: "true"
      # Use Alembic migrations (the Dockerfile runs `alembic upgrade head`),
      # never the dev auto-migrator.
      - key: AUTO_MIGRATE
        value: "false"
      # ── Secrets: set these in the Render dashboard (never commit them) ───────
      - key: DATABASE_URL          # Supabase/Postgres DSN, ?sslmode=require
        sync: false
      - key: JWT_SECRET            # >=32 random chars
        sync: false
      - key: ENCRYPTION_KEY        # Fernet key (provider keys at rest)
        sync: false
      - key: NOTARY_PRIVATE_KEY_PEM # stable evidence-signing key
        sync: false
      - key: CORS_ORIGINS          # e.g. https://your-app.vercel.app
        sync: false
      - key: APP_BASE_URL          # public dashboard URL (email links)
        sync: false
